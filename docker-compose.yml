services:
  api:
    build:
      context: ./backend
      target: api
    env_file: .env
    ports:
      - "127.0.0.1:8200:8000"   # free VM port; tunnel-only bind
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  scheduler:
    build:
      context: ./backend
      target: scheduler
    env_file: .env
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
  # dashboard / mobile-web: added later as siblings
